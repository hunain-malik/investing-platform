name: daily-analysis

on:
  schedule:
    # Hourly during US market hours + after-close, every weekday.
    # Math: 9 runs/day × ~8 min × 22 weekdays = ~1,584 min/month (well
    # under the 2000-min free tier). Each run regenerates live signals
    # and reruns the backtest, so the dashboard reflects current prices
    # roughly every hour during the trading day.
    #
    # Times in UTC, US Eastern equivalents in comments:
    - cron: "30 14 * * 1-5"  # 09:30 ET — market open
    - cron: "30 15 * * 1-5"  # 10:30 ET
    - cron: "30 16 * * 1-5"  # 11:30 ET
    - cron: "30 17 * * 1-5"  # 12:30 ET (midday)
    - cron: "30 18 * * 1-5"  # 13:30 ET
    - cron: "30 19 * * 1-5"  # 14:30 ET
    - cron: "30 20 * * 1-5"  # 15:30 ET (pre-close)
    - cron: "0 22 * * 1-5"   # 17:00 ET — after-close primary analysis
    - cron: "30 23 * * 1-5"  # 18:30 ET — after-hours sweep
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to push the updated JSON files back to the repo

concurrency:
  group: analysis
  cancel-in-progress: false

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        run: |
          python -m analysis.run

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: daily analysis $(date -u +%Y-%m-%d)"
            # Robust push: if remote moved while we ran, rebase our analysis
            # commit on top and try again. Retry up to 3 times.
            for i in 1 2 3; do
              if git push; then
                echo "Push succeeded."
                exit 0
              fi
              echo "Push failed (attempt $i/3); rebasing on latest origin/main..."
              git pull --rebase origin main
            done
            echo "Push still failing after retries."
            exit 1
          fi
