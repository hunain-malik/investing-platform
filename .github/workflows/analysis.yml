name: daily-analysis

on:
  schedule:
    # 22:00 UTC daily = 6pm ET, after US market close.
    # Yahoo Finance has the day's close available by then.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to push the updated JSON files back to the repo

concurrency:
  group: analysis
  cancel-in-progress: false

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        run: |
          python -m analysis.run

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: daily analysis $(date -u +%Y-%m-%d)"
            git push
          fi
