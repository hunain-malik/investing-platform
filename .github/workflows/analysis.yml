name: daily-analysis

on:
  schedule:
    # Multiple runs per US market day so the dashboard reflects current prices,
    # not just last close. Times are UTC; corresponds to:
    #   14:30 UTC = market open (9:30 ET)
    #   17:00 UTC = midday (12:00 ET)
    #   19:30 UTC = pre-close (14:30 ET)
    #   22:00 UTC = after close (17:00 ET) — primary analysis
    # Intraday runs include partial daily bars; the after-close run is the
    # authoritative one.
    - cron: "30 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 19 * * 1-5"
    - cron: "0 22 * * 1-5"
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to push the updated JSON files back to the repo

concurrency:
  group: analysis
  cancel-in-progress: false

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        run: |
          python -m analysis.run

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ state/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: daily analysis $(date -u +%Y-%m-%d)"
            git push
          fi
