# Investing platform configuration
#
# Watchlist and backtest universe live in analysis/universe.py (200+ tickers
# spanning large/mid caps, popular trading names, and ETFs). Edit there to
# add/remove tickers — keeping them in Python lets us deduplicate cleanly.
#
# To override the universe from this file, set watchlist / backtest_universe
# below. Otherwise the universe.py defaults are used.

# Your capital and risk profile. The position sizer reads these.
portfolio:
  capital_usd: 10000        # total capital available
  risk_per_trade_pct: 2.0   # max % of capital risked per trade
  max_position_pct: 25.0    # max % of capital in any single position
  options_allowed: true     # whether to consider options recommendations

# Forward-looking prediction horizons (trading days).
# 5d/10d/20d are short-term swing; 60d/120d are quarter/half-year;
# 252d is a 1-year view. Each horizon has its own per-pattern weights tuned
# independently from backtest accuracy at THAT horizon.
horizons_days: [5, 10, 20, 60, 120, 252]

# Backtesting configuration
backtest:
  samples_per_run: 3000         # bumped from 1500 to tighten per-horizon confidence intervals
  history_years: 10             # how far back to sample from (longer to give 252d horizon room)
  min_data_days: 252            # require at least 1 year of data before a cutoff
  threshold_up_pct: 1.0         # forward return >= this % counts as "up"
  threshold_down_pct: -1.0      # forward return <= this % counts as "down"

# Signal generation
signals:
  min_patterns_for_signal: 2     # need this many concurring patterns to emit a signal
  min_confidence: 0.65           # don't emit signals below this confidence
                                 # (early backtest data showed 0.5-0.7 confidence
                                 # calls are below 50% accuracy — raise threshold
                                 # as weight tuning concentrates edge in higher buckets)

# Initial pattern weights (broadcast across all horizons on first run; tuned
# per-horizon afterward based on backtest accuracy)
pattern_weights:
  sma_crossover_bull: 1.0
  sma_crossover_bear: 1.0
  golden_cross: 1.0
  death_cross: 1.0
  rsi_oversold: 1.0
  rsi_overbought: 1.0
  macd_cross_bull: 1.0
  macd_cross_bear: 1.0
  bb_squeeze_breakout_up: 1.0
  bb_squeeze_breakout_down: 1.0
  bullish_engulfing: 1.0
  bearish_engulfing: 1.0
  hammer: 1.0
  shooting_star: 1.0
  doji_at_support: 1.0
  doji_at_resistance: 1.0
  multi_timeframe_bull: 1.0
  multi_timeframe_bear: 1.0
  volume_breakout_bull: 1.0
  volume_breakout_bear: 1.0
  volume_dry_up: 1.0
  volume_dry_top: 1.0
  relative_strength_bull: 1.0
  relative_strength_bear: 1.0
